kind = "web"
previewPath = "/"
title = "ABA Note Assistant"
version = "1.0.0"
id = "artifacts/abanoteassistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18713

[services.development]
run = "pnpm --filter @workspace/abanoteassistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/abanoteassistant", "run", "build" ]
publicDir = "artifacts/abanoteassistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18713"
BASE_PATH = "/"
