openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ABA Note Assistant API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client operations
  - name: notes
    description: Note generation operations
  - name: admin
    description: Super-admin (platform) operations
  - name: billing
    description: Stripe billing (plans, checkout, customer portal, usage, webhooks)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register user and create company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Email delivery not configured (production requires Resend)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Confirm email address with token from registration email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Email verified (or already verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmailResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Resend verification email
      description: Always returns a generic success message to avoid email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/companies:
    get:
      operationId: listAdminCompanies
      tags: [admin]
      summary: List all companies (super admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCompanyListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not a super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/companies/{companyId}:
    patch:
      operationId: patchAdminCompany
      tags: [admin]
      summary: Update company flags (e.g. complimentary access)
      security:
        - bearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAdminCompanyRequest"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCompanyPatchResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all user accounts (super admin)
      description: >
        Returns every user (email, company, role). Does not include client/clinical data.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not a super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "200":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetailResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetailResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      description: >
        Permanently removes the client and cascades related session notes, program links, and
        behavior–program approval rows for this company. Cannot be undone.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClientResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/assessment/document:
    post:
      operationId: uploadClientAssessmentDocument
      tags: [clients]
      summary: Upload assessment PDF and store text for AI note grounding
      description: >
        Parses PDF text server-side, stores a truncated excerpt on the client profile (not returned in API JSON),
        and sets assessment status to ready. Call after creating or updating a client when the RBT selects an assessment file.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Assessment PDF (field name must be `file`)
              required:
                - file
      responses:
        "200":
          description: Updated client (profile in response omits stored assessment text)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetailResponse"
        "400":
          description: Invalid client id, missing file, or PDF parse error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/avatar/generate:
    post:
      operationId: generateClientAvatar
      tags: [clients]
      summary: Generate an AI cartoon avatar for the client
      description: >
        Uses the client's first name (cultural / ethnic cue), approximate age (from DOB), and gender to
        produce a stylized cartoon-style portrait via OpenAI's image API and stores it on the client row.
        Does not return image bytes; use the signed `avatarUrl` on the returned `Client`.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Avatar generated and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateClientAvatarResponse"
        "400":
          description: Missing first name on client (cannot generate)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream image-generation failure (model error, content policy refusal, quota)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/avatar:
    delete:
      operationId: deleteClientAvatar
      tags: [clients]
      summary: Remove the stored AI avatar for a client
      description: Clears the avatar bytes; the client falls back to initials in the UI.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Avatar cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/recommendations:
    post:
      operationId: createClientClinicalRecommendation
      tags: [clients]
      summary: Recommend programs and interventions from structured assessment only
      description: >
        Uses `profile.assessmentStructured` on the client. Does not invent labels: outputs are subsets of
        assessment allow-lists, filtered by FBA function when `replacement_program_functions` is populated.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicalRecommendationRequest"
      responses:
        "200":
          description: Recommendation or structured error in body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalRecommendationResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Missing or invalid structured assessment on profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/programs:
    get:
      operationId: listClientPrograms
      tags: [clients]
      summary: List replacement programs for a client
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/programs/{programId}:
    put:
      operationId: updateClientProgram
      tags: [clients]
      summary: Update a replacement program linked to a client
      description: >
        Updates the shared `programs` row (company-scoped). When `name` changes, matching entries in the
        client's `profile.replacementPrograms` are renamed to stay in sync. At least one body field is required.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProgramBody"
      responses:
        "200":
          description: Updated program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClientProgramResponse"
        "400":
          description: Invalid body, empty update, or invalid program type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client or program link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another program in the company already uses this name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteClientProgram
      tags: [clients]
      summary: Unlink a replacement program from a client
      description: >
        Removes the `client_programs` row. The `programs` row remains for the company. Removes the program
        name from `profile.replacementPrograms` when it matches the unlinked program so it is not re-linked
        on the next sync.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: programId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Program unlinked from client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteClientProgramResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client or program link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/behavior-program-approvals:
    get:
      operationId: listClientBehaviorProgramApprovals
      tags: [clients]
      summary: List maladaptive-behavior to replacement-program approvals for a client
      description: >
        Returns rows linking each profile maladaptive behavior label to approved replacement `programs`
        (same IDs as GET /clients/{clientId}/programs). Empty when none configured; the note wizard then
        does not restrict programs by behavior.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approval rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBehaviorProgramApprovalsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/replacement-programs:
    get:
      operationId: listClientReplacementPrograms
      tags: [clients]
      summary: List replacement programs linked to the client (same data as /programs without sessionHours)
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplacementProgramListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/behaviors/{behaviorLabel}/approved-programs:
    put:
      operationId: putClientBehaviorApprovedPrograms
      tags: [clients]
      summary: Replace approved replacement programs for one maladaptive behavior
      description: >
        `behaviorLabel` must be URL-encoded (e.g. `encodeURIComponent` in the browser). Replaces all
        approvals for this client + behavior with the provided list. Each `programId` must be linked to
        the client via GET /clients/{clientId}/programs.
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: behaviorLabel
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutBehaviorApprovedProgramsRequest"
      responses:
        "200":
          description: Saved approvals for this behavior
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutBehaviorApprovedProgramsResponse"
        "400":
          description: Invalid body or unknown program for client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found or behavior not on client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List session notes for the company
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/abc-builder/activity-antecedents:
    get:
      operationId: listAbcBuilderActivityAntecedents
      tags: [notes]
      summary: List predefined Activity/Antecedent strings for optional ABC Builder
      description: >
        Exact catalog for note-generation ABC Builder dropdowns. Values must be sent verbatim on POST /notes/generate abcHints[].activityAntecedent.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Activity/antecedent catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbcActivityAntecedentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{noteId}:
    get:
      operationId: getNote
      tags: [notes]
      summary: Get one session note by id
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a session note
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNoteResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/generate:
    post:
      operationId: generateNote
      tags: [notes]
      summary: Generate a session note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateNoteRequest"
      responses:
        "200":
          description: Successfully generated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateNoteResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - could not vary enough from recent notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Cannot generate — client has no assessment on file (upload FBA/BIP or equivalent first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: >
            Too many unsaved drafts. The user already has `MAX_UNSAVED_DRAFTS` (default 3)
            generated drafts that have not been saved or discarded; they must save one or
            POST `/notes/drafts/discard` before generating another. The body's `error` field
            carries the calm SaaS copy the UI should surface verbatim.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI provider error — OpenAI call failed (no template fallback; fix key, model, quota, or network)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI not configured — OPENAI_API_KEY missing or empty (note generation requires OpenAI)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/draft-quota:
    get:
      operationId: getDraftQuota
      tags: [notes]
      summary: Current unsaved-draft slots for the authenticated user
      description: >
        Returns the per-user counter of generated-but-not-yet-saved drafts and the configured
        cap. The UI uses this on page load (and after any generate/save/discard) to decide
        whether the Generate button should be disabled and to render the "X of N drafts" hint.
        Per-user, not per-company — two RBTs in the same company each have their own pool.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Quota snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDraftQuotaResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/drafts/discard:
    post:
      operationId: discardDrafts
      tags: [notes]
      summary: Reset the unsaved-draft counter for the authenticated user
      description: >
        Resets `unsaved_draft_count` to 0. Called by the "Discard drafts" / "Reset" action so
        the user can generate a fresh batch after deciding none of the existing drafts are
        worth saving. The generated note bodies themselves live only in the client UI; the
        server never persisted them, so there is nothing else to clean up.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Counter reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscardDraftsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{noteId}/save:
    post:
      operationId: saveNote
      tags: [notes]
      summary: Save a generated note as draft or final
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveNoteRequest"
      responses:
        "200":
          description: Note saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveNoteResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Payment required (subscription expired, suspended, or quota exhausted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/plans:
    get:
      operationId: listBillingPlans
      tags: [billing]
      summary: List available plans for the current deploy
      description: >
        Returns the marketing plan keys (`starter`, `growth`, `high`) the server has configured with
        Stripe Price IDs. Price IDs themselves are not returned to the client; the server resolves
        them when creating a Checkout Session. Safe to call without authentication.
      responses:
        "200":
          description: Plans available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlansResponse"

  /billing/status:
    get:
      operationId: getBillingStatus
      tags: [billing]
      summary: Current company's billing mode, plan, quota, and grace state
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/checkout:
    post:
      operationId: createBillingCheckoutSession
      tags: [billing]
      summary: Create a Stripe Checkout Session for a plan
      description: >
        Resolves the plan key to a configured Stripe Price ID, creates (or reuses) a Stripe Customer
        for the company, then returns a Checkout Session URL. Card collection is required up front;
        the configured trial period is applied via `subscription_data.trial_period_days` so trials
        are Stripe-native (no app-managed trial cap). Idempotent: returning users with an active
        subscription are sent to the Customer Portal URL instead.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCheckoutResponse"
        "400":
          description: Unknown plan or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured on this deploy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/portal:
    post:
      operationId: createBillingPortalSession
      tags: [billing]
      summary: Create a Stripe Customer Portal session
      description: >
        Returns a one-time URL into Stripe's hosted Customer Portal so the user can update card,
        cancel, change plan, and view invoices.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingPortalRequest"
      responses:
        "200":
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPortalResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: No Stripe customer on file (user has never checked out)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe not configured on this deploy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/webhook:
    post:
      operationId: stripeWebhook
      tags: [billing]
      summary: Stripe webhook receiver (raw body)
      description: >
        Accepts Stripe webhook events. Signature verification is done with `STRIPE_WEBHOOK_SECRET`;
        events are deduplicated via `processed_stripe_events`. Not part of the React/Zod codegen
        surface — the body is the raw bytes sent by Stripe and the response is a literal `{received:true}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Event received (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                required:
                  - received
        "400":
          description: Invalid signature or unreadable payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Stripe webhook not configured on this deploy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        notesClinicalBodyPolicy:
          type: string
          enum: [openai_only]
          description: >
            Session note clinical body is generated only via OpenAI; there is no server-side template fallback.
            If your deployed API omits this field, the server is running an older build — redeploy api-server dist and restart the process.
        openaiConfigured:
          type: boolean
          description: True when OPENAI_API_KEY is non-empty (required for POST /notes/generate).
        buildId:
          type: string
          description: Optional deploy stamp; set API_BUILD_ID (or CI commit SHA) on the host to verify which build is running.
      required:
        - status
        - notesClinicalBodyPolicy
        - openaiConfigured

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
        messages:
          type: array
          items:
            type: string
      required:
        - success
        - error

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        companyName:
          type: string
        companyAddress:
          type: string
        companyPhone:
          type: string
        companyEmail:
          type: string
          format: email
      required:
        - email
        - password
        - companyName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        companyId:
          type: integer
        role:
          type: string
          enum: [user, super_admin]
      required:
        - id
        - email
        - companyId
        - role

    AuthCompany:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        freeUsage:
          type: boolean
          description: When true, company has complimentary access (used when ENFORCE_COMPLIMENTARY_ACCESS is enabled on the server).
        billingMode:
          type: string
          enum: [complimentary, trial, subscription, suspended]
          description: Explicit billing mode (kept in sync with Stripe webhooks; complimentary overrides Stripe).
      required:
        - id
        - name
        - freeUsage

    AdminCompany:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        freeUsage:
          type: boolean
        billingMode:
          type: string
          enum: [complimentary, trial, subscription, suspended]
        subscriptionStatus:
          type: string
          nullable: true
        stripeCustomerId:
          type: string
          nullable: true
        currentPeriodEnd:
          type: string
          nullable: true
        userCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - freeUsage
        - userCount
        - createdAt

    AdminCompanyListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminCompany"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    PatchAdminCompanyRequest:
      type: object
      properties:
        freeUsage:
          type: boolean
        billingMode:
          type: string
          enum: [complimentary, trial, subscription, suspended]
          description: Super-admin override of billing mode. Independent from `freeUsage` for backward compatibility.

    AdminCompanyPatchResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AdminCompany"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    AdminUserAccount:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        companyId:
          type: integer
        companyName:
          type: string
        role:
          type: string
          enum: [user, super_admin]
        emailVerified:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - email
        - companyId
        - companyName
        - role
        - emailVerified
        - createdAt

    AdminUserListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserAccount"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    AuthPayload:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
        company:
          $ref: "#/components/schemas/AuthCompany"
      required:
        - token
        - user
        - company

    RegisterData:
      type: object
      description: >
        If pendingEmailVerification is true, the user must open the link in their email before signing in;
        token, user, and company are omitted. If false, the client is signed in immediately (e.g. local dev without Resend).
      properties:
        pendingEmailVerification:
          type: boolean
        message:
          type: string
        token:
          type: string
          nullable: true
        user:
          allOf:
            - $ref: "#/components/schemas/AuthUser"
          nullable: true
        company:
          allOf:
            - $ref: "#/components/schemas/AuthCompany"
          nullable: true
      required:
        - pendingEmailVerification
        - message

    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 16
      required:
        - token

    VerifyEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
          nullable: true
      required:
        - success
        - message

    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    ResendVerificationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
          nullable: true
      required:
        - success
        - message

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/RegisterData"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuthPayload"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    MaladaptiveBehaviorProfileEntry:
      type: object
      description: >
        Client-profile maladaptive target. `name` is the exact BIP/catalog label; `topography` is optional
        RBT-authored operational text (what the behavior looks like for this learner).
      properties:
        name:
          type: string
        topography:
          type: string
          nullable: true
          description: Operational definition; may be null when not entered.
      required:
        - name
        - topography

    ClientProfile:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
        maladaptiveBehaviors:
          type: array
          items:
            type: string
        maladaptiveBehaviorTargets:
          type: array
          items:
            $ref: "#/components/schemas/MaladaptiveBehaviorProfileEntry"
          description: >
            One row per entry in `maladaptiveBehaviors` (same order). `topography` is null when not set on the server.
        replacementPrograms:
          type: array
          items:
            type: string
        interventions:
          type: array
          items:
            type: string
        assessmentFileName:
          type: string
          nullable: true
        assessmentStructured:
          $ref: "#/components/schemas/AssessmentStructured"
          nullable: true
          description: >
            Optional curated allow-lists from the client assessment (exact BIP strings). When set, POST /notes/generate
            intersects maladaptive, intervention, and replacement-program catalogs with these lists only, and
            POST /clients/{clientId}/recommendations uses them for audit-safe suggestions.
        assessmentAuthorizationExpiresOn:
          type: string
          nullable: true
          description: >
            ISO `yyyy-MM-dd` date the client's authorization (assessment / treatment plan) expires. Surfaced in red
            on the clients list and detail header so the RBT knows when the assessment lapses. Null/missing means
            "no expiration on file" (UI hides the badge).
      required:
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - maladaptiveBehaviors
        - maladaptiveBehaviorTargets
        - replacementPrograms
        - interventions

    AssessmentStructured:
      type: object
      description: >
        Exact strings authorized on the client assessment. Maps must only reference keys/values present in the arrays.
      required:
        - behaviors
        - replacement_programs
        - interventions
        - behavior_to_replacements_map
        - behavior_to_interventions_map
      properties:
        behaviors:
          type: array
          items:
            type: string
        replacement_programs:
          type: array
          items:
            type: string
        interventions:
          type: array
          items:
            type: string
        behavior_to_replacements_map:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        behavior_to_interventions_map:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        replacement_program_functions:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
              enum: [escape, attention, tangible, automatic]
          description: >
            Optional. Replacement program name (exact string) to FBA functions used for filtering recommendations.
        general_interventions:
          type: array
          items:
            type: string
          description: >
            Optional interventions allowed when a behavior has no behavior_to_interventions_map entry (must be subset of interventions).

    ClinicalRecommendationRequest:
      type: object
      required:
        - behavior
        - function
        - severity_level
        - is_dangerous
      properties:
        behavior:
          type: string
          description: Exact maladaptive behavior label from assessmentStructured.behaviors
        behavior_topography:
          type: string
        operational_definition:
          type: string
        function:
          type: string
          enum: [escape, attention, tangible, automatic]
        severity_level:
          type: string
          enum: [low, moderate, high]
        is_dangerous:
          type: boolean

    ClinicalRecommendationData:
      type: object
      required:
        - behavior
        - function
        - replacement_programs
        - recommended_interventions
        - risk_level
        - notes
      properties:
        behavior:
          type: string
        function:
          type: string
        replacement_programs:
          type: array
          items:
            type: string
        recommended_interventions:
          type: array
          items:
            type: string
        risk_level:
          type: string
        notes:
          type: string

    ClinicalRecommendationResponse:
      type: object
      required:
        - success
        - data
        - error
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/ClinicalRecommendationData"
          nullable: true
        error:
          type: string
          nullable: true
        messages:
          type: array
          items:
            type: string

    CreateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
        ageBand:
          type: string
        hasAssessment:
          type: boolean
        assessmentStatus:
          type: string
          enum: [uploaded, processing, ready, missing]
        assessmentFileName:
          type: string
          nullable: true
        maladaptiveBehaviors:
          type: array
          items:
            type: string
        maladaptiveBehaviorTargets:
          type: array
          items:
            $ref: "#/components/schemas/MaladaptiveBehaviorProfileEntry"
          description: >
            Optional. When sent, topographies are stored per behavior name; server aligns rows to `maladaptiveBehaviors`.
        replacementPrograms:
          type: array
          items:
            type: string
        interventions:
          type: array
          items:
            type: string
        assessmentStructured:
          $ref: "#/components/schemas/AssessmentStructured"
          nullable: true
        assessmentAuthorizationExpiresOn:
          type: string
          nullable: true
          description: >
            ISO `yyyy-MM-dd` date the client's authorization expires. Optional; null/missing means
            "no expiration on file."
      required:
        - firstName
        - lastName
        - dateOfBirth
        - gender
        - hasAssessment
        - assessmentStatus
        - maladaptiveBehaviors
        - replacementPrograms
        - interventions

    UpdateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
        gender:
          type: string
        ageBand:
          type: string
        hasAssessment:
          type: boolean
        assessmentStatus:
          type: string
          enum: [uploaded, processing, ready, missing]
        assessmentFileName:
          type: string
          nullable: true
        maladaptiveBehaviors:
          type: array
          items:
            type: string
        maladaptiveBehaviorTargets:
          type: array
          items:
            $ref: "#/components/schemas/MaladaptiveBehaviorProfileEntry"
          description: >
            Optional. When sent without `maladaptiveBehaviors`, names are taken from these entries in order.
        replacementPrograms:
          type: array
          items:
            type: string
        interventions:
          type: array
          items:
            type: string
        assessmentStructured:
          $ref: "#/components/schemas/AssessmentStructured"
          nullable: true
        assessmentAuthorizationExpiresOn:
          type: string
          nullable: true
          description: >
            ISO `yyyy-MM-dd` date the client's authorization expires. Send null to clear the stored value;
            omit to leave it unchanged.
        clearAssessment:
          type: boolean
          description: >
            When true, removes the stored assessment PDF file name, excerpt text snapshot, and structured
            assessment allow-lists from the client profile; sets hasAssessment to false and assessmentStatus
            to missing. Use when the RBT removes the assessment without uploading a replacement in the same request.
            Ignored when false or omitted.

    Client:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        ageBand:
          type: string
        hasAssessment:
          type: boolean
        assessmentStatus:
          type: string
          enum: [uploaded, processing, ready, missing]
        avatarUrl:
          type: string
          nullable: true
          description: >
            Signed URL the browser can drop directly into `<img src=…>` to load the AI-generated avatar.
            The signature is bound to `avatarUpdatedAt`, so any regeneration mints a new URL and the
            browser cache invalidates automatically. Null when the client has no avatar on file.
        avatarUpdatedAt:
          type: string
          nullable: true
          description: >
            ISO timestamp (e.g. `2026-05-03T21:55:40.123Z`) when the avatar was most recently generated.
            Plain string (not `format: date-time`) so the generated Zod validator stays as `z.string()`
            and accepts the JSON wire shape directly. Null when no avatar is on file.
        profile:
          $ref: "#/components/schemas/ClientProfile"
          nullable: true
      required:
        - id
        - companyId
        - name
        - hasAssessment
        - assessmentStatus

    ClientListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    ClientDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Client"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    GenerateClientAvatarResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            avatarUrl:
              type: string
              nullable: true
            avatarUpdatedAt:
              type: string
              nullable: true
              description: ISO timestamp; plain string for Zod compatibility (see Client.avatarUpdatedAt).
            client:
              $ref: "#/components/schemas/Client"
          required:
            - avatarUrl
            - avatarUpdatedAt
            - client
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    Program:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [primary, supplemental]
        description:
          type: string
      required:
        - id
        - companyId
        - name
        - type

    ProgramListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Program"
        minimumRequired:
          type: integer
        error:
          type: string
          nullable: true
      required:
        - success
        - data
        - minimumRequired

    UpdateClientProgramBody:
      type: object
