    GenerateNoteRequest:
      type: object
      properties:
        clientId:
          type: integer
        sessionHours:
          type: integer
          minimum: 1
          maximum: 8
        sessionDate:
          type: string
        therapySetting:
          type: string
          enum:
            - "Seasonal Residence"
            - "Walk-in Retail Health Clinic"
            - "Neighbor Residence"
            - "Office"
            - "Prescribed Pediatric Extended Care (PPEC) Center"
            - "Relative Residence"
            - "School"
            - "School/Community"
            - "School/Home"
            - "Home"
            - "Home/School"
            - "Home/Community"
            - "Home/Daycare"
            - "Independent Clinic"
            - "Medical Facility"
            - "Member Home"
            - "Comprehensive Outpatient Rehab Facility"
            - "Daycare"
            - "Daycare/Community"
            - "Daycare/Home"
            - "Family Home"
            - "Friend Residence"
            - "Group Home"
            - "Assisted Living Facility (ALF)"
            - "Community Mental Health Center"
            - "Community"
            - "Community/Daycare"
            - "Community/Home"
            - "Community/School"
          description: >
            Where therapy was delivered. Must be one of the approved location labels; drives the locked opening location phrase assembled server-side (do not paraphrase the stored label when interpreting setting for the clinical body).
        presentPeople:
          type: array
          items:
            type: string
        hasEnvironmentalChanges:
          type: boolean
        environmentalChanges:
          type: string
        selectedReplacements:
          type: array
          items:
            type: integer
        nextSessionDate:
          type: string
        abcHints:
          type: array
          description: >
            Optional ABC Builder rows, index-aligned with service hours (index 0 = first hour). When both activityAntecedent and maladaptiveBehavior are set for an index, the AI must use those exact strings for that hour; empty rows use default AI rotation. Optional replacementProgramId per index assigns which linked replacement program that hour's ABC documents (defaults to server rotation from selectedReplacements). When replacementProgramId is not among selectedReplacements, the narrative must document RBT actions only for that hour—no valenced client outcome. Length must not exceed sessionHours. Omit or send [] for fully automatic ABCs.
          maxItems: 8
          items:
            $ref: "#/components/schemas/AbcHintEntry"
        programTrialData:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ProgramTrialDataEntry"
          description: >
            Optional. Maps replacement program id (string keys, e.g. "42") to trial metadata. When `count` is **null**, no trial data was entered and the server uses default quantified replacement-program language for that hour. When `count` is **>= 1**, the therapist entered trial data for that program — `effectiveTrials` lists the 1-based trial indices that met criterion (so an empty `effectiveTrials` paired with `count >= 1` represents **0 successes / count trials**, i.e. a deliberate 0% entry, not "no data"). The clinical narrative for that hour must incorporate the rounded percentage (`successfulTrialNumbers.length` / `totalTrials`) for the verbatim replacement program name. Ignored for hours that document RBT-only replacement programs (not selected session targets).
      required:
        - clientId
        - sessionHours
        - sessionDate
        - therapySetting
        - presentPeople
        - hasEnvironmentalChanges
        - selectedReplacements

    ProgramTrialDataEntry:
      type: object
      properties:
        count:
          type: integer
          nullable: true
          description: >
            Total trials conducted for this replacement program when therapist-entered. `null` means "no trial data entered" — the server falls back to default quantified language. `>= 1` means trials were entered (including a deliberate 0% selection, encoded as `count >= 1` plus an empty `effectiveTrials`).
        effectiveTrials:
          type: array
          items:
            type: integer
          description: >
            1-based indices of trials in which the client met criterion (e.g. [2, 4, 5] for trials 2, 4, and 5). When empty AND `count >= 1`, this represents **0 successes / count trials** (a 0% entry); the server still injects the rounded percentage into the prose. When empty AND `count` is null, no data was entered.
      required:
        - count
        - effectiveTrials

    AbcHintEntry:
      type: object
      description: >
        One optional ABC row. activityAntecedent and maladaptiveBehavior must be non-empty together, or both empty/null — partial pairs are invalid. replacementProgramId may be set alone or with a complete activity/behavior pair.
      properties:
        activityAntecedent:
          type: string
          nullable: true
          description: Exact string from GET /notes/abc-builder/activity-antecedents
        maladaptiveBehavior:
          type: string
          nullable: true
          description: Exact maladaptive behavior label from the client BIP/profile catalog
        replacementProgramId:
          type: integer
          nullable: true
          description: >
            Optional. ID of a replacement program linked to this client (GET /clients/:id/programs). When set, hour h uses this program in the ABC instead of the default rotation from selectedReplacements. If this id is not in selectedReplacements, the clinical narrative for that hour must describe RBT implementation only and must not state positive or negative client outcomes for that program.

    AbcActivityAntecedentListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            activities:
              type: array
              items:
                type: string
          required:
            - activities
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    GenerateNoteResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/GeneratedNote"
        warnings:
          type: array
          items:
            type: string
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    MaladaptiveReplacementPairing:
      type: object
      description: >
        One row for integrations that need **maladaptive catalog behavior → replacement program** pairings only.
        Omitted for skill-acquisition-only narrative segments (no maladaptive episode).
      required:
        - segmentIndex
        - maladaptiveBehavior
        - replacementProgramName
      properties:
        segmentIndex:
          type: integer
          minimum: 0
          description: Zero-based narrative segment index after session collapse (replacement-program slots).
        maladaptiveBehavior:
          type: string
          description: Maladaptive behavior catalog label for this segment (never a replacement program name).
        replacementProgramName:
          type: string
          description: Replacement program name documented for this segment in the generated note.

    GeneratedNote:
      type: object
      properties:
        noteId:
          type: integer
        content:
          type: string
        clientId:
          type: integer
        clientName:
          type: string
        sessionDate:
          type: string
        sessionHours:
          type: integer
        generatedAt:
          type: string
        generationSource:
          type: string
          description: Always openai on success; template is legacy for older clients only
          enum: [openai, template]
        generationModel:
          type: string
          nullable: true
          description: OpenAI model id used for the clinical body (set on success)
        maladaptiveReplacementPairings:
          type: array
          items:
            $ref: "#/components/schemas/MaladaptiveReplacementPairing"
          description: >
            Authoritative **behavior → replacement program** rows for this session (post-collapse segments).
            **Excludes** skill-acquisition-only segments (e.g. program names containing "Echoic", or "Respond to Own Name"),
            which are not maladaptive-behavior episodes. Downstream `replacementProgramImplementation`-style lists should
            use this array instead of inferring a "behavior" from replacement program names for every paragraph.
        draftQuota:
          $ref: "#/components/schemas/DraftQuota"
          description: >
            Updated unsaved-draft slot snapshot AFTER this generation was counted. The UI uses
            `used == max` to disable the Generate button until the user saves or discards.
      required:
        - noteId
        - content
        - clientId
        - clientName
        - sessionDate
        - sessionHours
        - generatedAt
        - generationSource
        - generationModel

    NoteSummary:
      type: object
      properties:
        noteId:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        status:
          type: string
