    SaveNoteResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            noteId:
              type: integer
            status:
              type: string
            billing:
              $ref: "#/components/schemas/SaveNoteBillingSnapshot"
            draftQuota:
              $ref: "#/components/schemas/DraftQuota"
              description: >
                Unsaved-draft slot snapshot after the save reset the counter (always
                `{ used: 0, max }`). Included so the UI can re-enable the Generate button
                without a follow-up round trip.
          required:
            - noteId
            - status
        error:
          type: string
          nullable: true
        warnings:
          type: array
          items:
            type: string
      required:
        - success
        - data

    DraftQuota:
      type: object
      description: >
        Per-user counter of generated-but-not-yet-saved notes. The server caps `used` at `max`;
        once they're equal, POST /notes/generate returns 429 until the user POSTs to
        /notes/drafts/discard or saves a note (either resets used to 0).
      required:
        - used
        - max
      properties:
        used:
          type: integer
          minimum: 0
          description: Current count of unsaved drafts this user has generated.
        max:
          type: integer
          minimum: 1
          description: Configured cap. Default 3 (env `MAX_UNSAVED_DRAFTS`). May vary per plan in future.

    GetDraftQuotaResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/DraftQuota"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    DiscardDraftsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/DraftQuota"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    SaveNoteBillingSnapshot:
      type: object
      description: >
        Best-effort snapshot of the company's billing state immediately after save. Returned only
        when billing enforcement is on; the UI uses it to surface "X / Y notes saved" without an
        extra round trip. When enforcement is off this is omitted entirely (backward compatible).
      properties:
        billingMode:
          type: string
          enum: [complimentary, trial, subscription, suspended]
        savedThisPeriod:
          type: integer
          minimum: 0
        savedQuota:
          type: integer
          minimum: 0
          nullable: true
          description: Plan note quota; null when complimentary / unlimited.
        countedThisRequest:
          type: boolean
          description: True when this save inserted a new ledger row (i.e. first save of this note in this period).
      required:
        - billingMode
        - savedThisPeriod
        - countedThisRequest

    BillingPlanKey:
      type: string
      enum: [starter, growth, high]
      description: Marketing plan key. Server maps each key to a configured Stripe Price ID.

    BillingPlanSummary:
      type: object
      properties:
        key:
          $ref: "#/components/schemas/BillingPlanKey"
        label:
          type: string
        savedNotesQuota:
          type: integer
          minimum: 0
        priceUsdMonthly:
          type: number
          description: Display-only USD price (charged amounts come from Stripe).
        available:
          type: boolean
          description: True when the server has a Stripe Price ID configured for this plan.
      required:
        - key
        - label
        - savedNotesQuota
        - priceUsdMonthly
        - available

    BillingPlansResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            stripeConfigured:
              type: boolean
            trialDays:
              type: integer
              minimum: 0
            plans:
              type: array
              items:
                $ref: "#/components/schemas/BillingPlanSummary"
          required:
            - stripeConfigured
            - trialDays
            - plans
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    BillingStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            companyId:
              type: integer
            billingMode:
              type: string
              enum: [complimentary, trial, subscription, suspended]
            enforcement:
              type: string
              enum: [off, soft, hard]
              description: >
                `off` = no enforcement (legacy behavior). `soft` = warnings only, never blocks.
                `hard` = full enforcement (block save when over quota, block generate when past grace).
            plan:
              $ref: "#/components/schemas/BillingPlanSummary"
              nullable: true
            stripeCustomerPresent:
              type: boolean
            subscription:
              type: object
              nullable: true
              properties:
                status:
                  type: string
                currentPeriodStart:
                  type: string
                  nullable: true
                currentPeriodEnd:
                  type: string
                  nullable: true
                cancelAt:
                  type: string
                  nullable: true
              required:
                - status
            trialEndsAt:
              type: string
              nullable: true
            paymentFailedAt:
              type: string
              nullable: true
            gracePeriodUntil:
              type: string
              nullable: true
            inGracePeriod:
              type: boolean
            generationAllowed:
              type: boolean
              description: True when this company is allowed to call POST /notes/generate.
            saveAllowed:
              type: boolean
              description: True when this company is allowed to call POST /notes/{id}/save.
            blockedReason:
              type: string
              nullable: true
            savedThisPeriod:
              type: integer
              minimum: 0
            savedQuota:
              type: integer
              minimum: 0
              nullable: true
            usagePercent:
              type: number
              nullable: true
              description: 0..100 share of quota consumed (null when no quota / unlimited).
          required:
            - companyId
            - billingMode
            - enforcement
            - stripeCustomerPresent
            - inGracePeriod
            - generationAllowed
            - saveAllowed
            - savedThisPeriod
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    BillingCheckoutRequest:
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/BillingPlanKey"
        successUrl:
          type: string
          description: Where Stripe should redirect after success. Server validates host against APP_ORIGIN allowlist.
        cancelUrl:
          type: string
      required:
        - plan
        - successUrl
        - cancelUrl

    BillingCheckoutResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            url:
              type: string
            mode:
              type: string
              enum: [checkout, portal]
              description: >
                `checkout` is a new Stripe Checkout Session. `portal` is returned when the user
                already has an active subscription — we send them to the Customer Portal so they
                can change plan rather than starting a duplicate subscription.
          required:
            - url
            - mode
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    BillingPortalRequest:
      type: object
      properties:
        returnUrl:
          type: string

    BillingPortalResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            url:
              type: string
          required:
            - url
        error:
          type: string
          nullable: true
      required:
        - success
        - data
