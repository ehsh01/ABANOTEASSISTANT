openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ABA Note Assistant API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clients
    description: Client operations
  - name: notes
    description: Note generation operations
  - name: admin
    description: Super-admin (platform) operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register user and create company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Email delivery not configured (production requires Resend)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Confirm email address with token from registration email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Email verified (or already verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmailResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Resend verification email
      description: Always returns a generic success message to avoid email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/companies:
    get:
      operationId: listAdminCompanies
      tags: [admin]
      summary: List all companies (super admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCompanyListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not a super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/companies/{companyId}:
    patch:
      operationId: patchAdminCompany
      tags: [admin]
      summary: Update company flags (e.g. complimentary access)
      security:
        - bearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAdminCompanyRequest"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCompanyPatchResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all user accounts (super admin)
      description: >
        Returns every user (email, company, role). Does not include client/clinical data.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not a super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{clientId}/programs:
    get:
      operationId: listClientPrograms
      tags: [clients]
      summary: List replacement programs for a client
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/generate:
    post:
      operationId: generateNote
      tags: [notes]
      summary: Generate a session note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateNoteRequest"
      responses:
        "200":
          description: Successfully generated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateNoteResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Client not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - could not vary enough from recent notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notes/{noteId}/save:
    post:
      operationId: saveNote
      tags: [notes]
      summary: Save a generated note as draft or final
      security:
        - bearerAuth: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveNoteRequest"
      responses:
        "200":
          description: Note saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveNoteResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
        messages:
          type: array
          items:
            type: string
      required:
        - success
        - error

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        companyName:
          type: string
        companyAddress:
          type: string
        companyPhone:
          type: string
        companyEmail:
          type: string
          format: email
      required:
        - email
        - password
        - companyName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        companyId:
          type: integer
        role:
          type: string
          enum: [user, super_admin]
      required:
        - id
        - email
        - companyId
        - role

    AuthCompany:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        freeUsage:
          type: boolean
          description: When true, company has complimentary access (used when ENFORCE_COMPLIMENTARY_ACCESS is enabled on the server).
      required:
        - id
        - name
        - freeUsage

    AdminCompany:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        freeUsage:
          type: boolean
        userCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - freeUsage
        - userCount
        - createdAt

    AdminCompanyListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminCompany"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    PatchAdminCompanyRequest:
      type: object
      properties:
        freeUsage:
          type: boolean
      required:
        - freeUsage

    AdminCompanyPatchResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AdminCompany"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    AdminUserAccount:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        companyId:
          type: integer
        companyName:
          type: string
        role:
          type: string
          enum: [user, super_admin]
        emailVerified:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - email
        - companyId
        - companyName
        - role
        - emailVerified
        - createdAt

    AdminUserListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserAccount"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    AuthPayload:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
        company:
          $ref: "#/components/schemas/AuthCompany"
      required:
        - token
        - user
        - company

    RegisterData:
      type: object
      description: >
        If pendingEmailVerification is true, the user must open the link in their email before signing in;
        token, user, and company are omitted. If false, the client is signed in immediately (e.g. local dev without Resend).
      properties:
        pendingEmailVerification:
          type: boolean
        message:
          type: string
        token:
          type: string
          nullable: true
        user:
          allOf:
            - $ref: "#/components/schemas/AuthUser"
          nullable: true
        company:
          allOf:
            - $ref: "#/components/schemas/AuthCompany"
          nullable: true
      required:
        - pendingEmailVerification
        - message

    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 16
      required:
        - token

    VerifyEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
          nullable: true
      required:
        - success
        - message

    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    ResendVerificationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
          nullable: true
      required:
        - success
        - message

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/RegisterData"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/AuthPayload"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    Client:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        ageBand:
          type: string
        hasAssessment:
          type: boolean
        assessmentStatus:
          type: string
          enum: [uploaded, processing, ready, missing]
      required:
        - id
        - companyId
        - name
        - hasAssessment
        - assessmentStatus

    ClientListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    ClientDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/Client"
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    Program:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [primary, supplemental]
        description:
          type: string
      required:
        - id
        - companyId
        - name
        - type

    ProgramListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/Program"
        minimumRequired:
          type: integer
        error:
          type: string
          nullable: true
      required:
        - success
        - data
        - minimumRequired

    GenerateNoteRequest:
      type: object
      properties:
        clientId:
          type: integer
        sessionHours:
          type: integer
          minimum: 1
          maximum: 8
        sessionDate:
          type: string
        presentPeople:
          type: array
          items:
            type: string
        hasEnvironmentalChanges:
          type: boolean
        environmentalChanges:
          type: string
        selectedReplacements:
          type: array
          items:
            type: integer
        nextSessionDate:
          type: string
      required:
        - clientId
        - sessionHours
        - sessionDate
        - presentPeople
        - hasEnvironmentalChanges
        - selectedReplacements

    GenerateNoteResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/GeneratedNote"
        warnings:
          type: array
          items:
            type: string
        error:
          type: string
          nullable: true
      required:
        - success
        - data

    GeneratedNote:
      type: object
      properties:
        noteId:
          type: integer
        content:
          type: string
        clientId:
          type: integer
        clientName:
          type: string
        sessionDate:
          type: string
        sessionHours:
          type: integer
        generatedAt:
          type: string
      required:
        - noteId
        - content
        - clientId
        - clientName
        - sessionDate
        - sessionHours
        - generatedAt

    SaveNoteRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, final]
        content:
          type: string
      required:
        - status
        - content

    SaveNoteResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            noteId:
              type: integer
            status:
              type: string
          required:
            - noteId
            - status
        error:
          type: string
          nullable: true
      required:
        - success
        - data
