# Nginx: staging.abanoteassistant.com — ABA Note Assistant (not ReviewKeeper)
#
# Problem this fixes: if no server_name matches staging.abanoteassistant.com, HTTPS
# falls through to nginx default_server (often ReviewKeeper on this droplet).
#
# API: PM2 app `abanoteassistant-api-staging` → default port 5007
#      (override with API_PORT_STAGING in artifacts/api-server/.env)
# Static: same build as production — /var/www/ABANOTEASSISTANT/artifacts/abanoteassistant/dist/public
#
# TLS: certbot certonly --webroot -w /var/www/html -d staging.abanoteassistant.com
# Install: cp to /etc/nginx/sites-available/abanoteassistant-staging, symlink sites-enabled, nginx -t, reload

server {
    listen 80;
    listen [::]:80;
    server_name staging.abanoteassistant.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.abanoteassistant.com;

    ssl_certificate /etc/letsencrypt/live/staging.abanoteassistant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.abanoteassistant.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api {
        proxy_pass http://127.0.0.1:5007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 25M;
    }

    location / {
        root /var/www/ABANOTEASSISTANT/artifacts/abanoteassistant/dist/public;
        try_files $uri $uri/ /index.html;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:5007/api/healthz;
        access_log off;
    }
}
