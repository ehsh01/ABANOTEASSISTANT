# Nginx configuration for abanoteassistant.com
# Keep location /api → Node API: the SPA uses fetch("/api/...") when VITE_API_BASE_URL is unset.
# Place this file in /etc/nginx/sites-available/abanoteassistant
# Then create symlink: ln -s /etc/nginx/sites-available/abanoteassistant /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name abanoteassistant.com www.abanoteassistant.com;

    # API endpoints - proxy to ABA Note Assistant API (port 5002)
    location /api {
        proxy_pass http://localhost:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeouts for API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend static files (if serving from same domain)
    location / {
        root /var/www/ABANOTEASSISTANT/artifacts/abanoteassistant/dist/public;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check endpoint (optional, for monitoring)
    location /healthz {
        proxy_pass http://localhost:5002/api/healthz;
        access_log off;
    }
}
