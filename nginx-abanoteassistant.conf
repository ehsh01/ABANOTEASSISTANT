# Nginx configuration for abanoteassistant.com
# Keep location /api → Node API: the SPA uses fetch("/api/...") when VITE_API_BASE_URL is unset.
# Place this file in /etc/nginx/sites-available/abanoteassistant
# Then create symlink: ln -s /etc/nginx/sites-available/abanoteassistant /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name abanoteassistant.com www.abanoteassistant.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name abanoteassistant.com www.abanoteassistant.com;

    ssl_certificate /etc/letsencrypt/live/abanoteassistant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abanoteassistant.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API endpoints - proxy to ABA Note Assistant API (port 5002)
    location /api {
        proxy_pass http://localhost:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long AI note generation (multi-hour notes run several
        # sequential OpenAI calls + repair passes). Keep this above the worst-case generation
        # time so nginx never cuts the upstream off early with a 504.
        # NOTE: Cloudflare fronts this domain and has its own ~100s origin timeout (524) on
        # non-Enterprise plans; generations that exceed ~100s need async generation, not just
        # a higher nginx value.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 25M;
    }

    root /var/www/ABANOTEASSISTANT/artifacts/abanoteassistant/dist/public;

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ~* ^/sw-v[0-9]+\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Hashed Vite assets can be cached long-term.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /healthz {
        proxy_pass http://localhost:5002/api/healthz;
        access_log off;
    }
}
